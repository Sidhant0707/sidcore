<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sidcore</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, Helvetica, sans-serif;
    }

    body {
      background-color: #0f172a;
      color: #e5e7eb;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .container {
      max-width: 700px;
      text-align: center;
      padding: 40px;
    }

    h1 {
      font-size: 3rem;
      margin-bottom: 10px;
      color: #38bdf8;
    }

    h2 {
      font-size: 1.4rem;
      font-weight: normal;
      margin-bottom: 30px;
      color: #cbd5f5;
    }

    p {
      font-size: 1rem;
      line-height: 1.6;
      margin-bottom: 30px;
      color: #d1d5db;
    }

    .links a {
      display: inline-block;
      margin: 10px;
      padding: 10px 18px;
      text-decoration: none;
      color: #0f172a;
      background-color: #38bdf8;
      border-radius: 6px;
      font-weight: bold;
      transition: transform 0.2s, background-color 0.2s;
    }

    .links a:hover {
      background-color: #0ea5e9;
      transform: translateY(-2px);
    }

    footer {
      margin-top: 40px;
      font-size: 0.85rem;
      color: #9ca3af;
    }
  </style>
</head>

<body>
  <div class="container">
    <h1>Sidcore</h1>
    <h2>Building skills. Shipping code.</h2>

    <p>
      Hi, I’m <strong>Sidhant</strong> — a Computer Science student exploring
      problem solving, web development, and real-world software engineering.
      This site will grow as I build and learn.
    </p>

    <div class="links">
      <a href="https://github.com/Sidhant0707" target="_blank">GitHub</a>
      <a href="#" target="_blank">LinkedIn</a>
      <a href="#" target="_blank">Resume</a>
    </div>

    <footer>
      © 2026 Sidcore · Under continuous development
    </footer>
  </div>
</body>
</html>
